{{- $title := or .Attributes.title "" -}}
{{- $lang := or .Type "text" -}}
<div class="highlight-wrapper" data-lang-label="{{ $lang }}">
    {{- with $title -}}
    <div class="codeblock-title">
        {{- $title -}}
    </div>
    {{- end -}}
    {{- transform.Highlight .Inner $lang .Options -}}
</div>
