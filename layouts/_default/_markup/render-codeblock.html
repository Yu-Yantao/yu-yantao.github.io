{{- $title := or .Attributes.title "" -}}
{{- $lang := lower (or .Type "text") -}}
{{- $label := cond (eq $lang "text") "text" $lang -}}
<div class="highlight-wrapper" data-lang="{{ $lang }}" data-lang-label="{{ $label }}">
  {{- with $title -}}
    <div class="codeblock-title">
      {{- $title -}}
    </div>
  {{- end -}}
  {{- transform.Highlight .Inner $lang .Options -}}
</div>
